<!DOCTYPE html>
<html>
<head>
  <title>EpiSignal v2</title>
</head>

<body>

<h1>EpiSignal AI v2</h1>

<input id="city" placeholder="Stadt">

<br><br>

<label><input type="checkbox" id="fever"> Fieber</label>
<label><input type="checkbox" id="cough"> Husten</label>
<label><input type="checkbox" id="fatigue"> Müdigkeit</label>

<br><br>

<button onclick="send()">Senden</button>

<h3 id="result"></h3>

<script>

function calcScore(){
  let score = 0;

  if(document.getElementById("fever").checked) score += 3;
  if(document.getElementById("cough").checked) score += 2;
  if(document.getElementById("fatigue").checked) score += 1;

  return score;
}

function riskLevel(score){
  if(score >= 6) return "HOCH 🔴";
  if(score >= 3) return "MITTEL 🟡";
  return "NIEDRIG 🟢";
}

function send(){

  let city = document.getElementById("city").value;
  let score = calcScore();
  let risk = riskLevel(score);

  document.getElementById("result").innerText =
    city + " → " + risk;

  fetch("DEINE_APPS_SCRIPT_URL", {
    method: "POST",
    body: JSON.stringify({
      city: city,
      fever: document.getElementById("fever").checked,
      cough: document.getElementById("cough").checked,
      fatigue: document.getElementById("fatigue").checked,
      score: score,
      risk: risk
    })
  });

}

</script>

</body>
</html>
